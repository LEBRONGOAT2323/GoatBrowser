<!DOCTYPE html>
<html>
<head>
  <title>Goat Browser</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #1a1a1a;
      color: white;
    }

    .navbar {
      display: flex;
      gap: 8px;
      padding: 10px;
      background: #2a2a2a;
      align-items: center;
    }

    button {
      padding: 6px 12px;
      background: #00c3ff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    input {
      flex: 1;
      padding: 6px;
      border-radius: 5px;
      border: none;
      background: #111;
      color: white;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 50px);
      border: none;
      background: white;
    }

    .loading {
      height: 3px;
      background: #00c3ff;
      width: 0%;
      transition: width 0.3s;
    }
  </style>
</head>
<body>

  <div class="loading" id="loadingBar"></div>

  <div class="navbar">
    <button onclick="back()">◀</button>
    <button onclick="forward()">▶</button>
    <button onclick="refresh()">⟳</button>
    <input id="url" placeholder="Enter URL (example.com)">
    <button onclick="go()">Go</button>
  </div>

  <iframe id="browser"></iframe>

  <script>
    const iframe = document.getElementById("browser");
    const loadingBar = document.getElementById("loadingBar");
    let historyStack = [];
    let historyIndex = -1;

    function normalize(url) {
      if (!url.startsWith("http")) {
        return "https://" + url;
      }
      return url;
    }

    function go() {
      let url = normalize(document.getElementById("url").value);
      loadURL(url);
    }

    function loadURL(url) {
      loadingBar.style.width = "30%";
      iframe.src = url;

      historyStack = historyStack.slice(0, historyIndex + 1);
      historyStack.push(url);
      historyIndex++;

      loadingBar.style.width = "70%";

      iframe.onload = () => {
        loadingBar.style.width = "100%";
        setTimeout(() => {
          loadingBar.style.width = "0%";
        }, 300);
      };
    }

    function back() {
      if (historyIndex > 0) {
        historyIndex--;
        iframe.src = historyStack[historyIndex];
      }
    }

    function forward() {
      if (historyIndex < historyStack.length - 1) {
        historyIndex++;
        iframe.src = historyStack[historyIndex];
      }
    }

    function refresh() {
      iframe.src = historyStack[historyIndex];
    }
  </script>

</body>
</html>
